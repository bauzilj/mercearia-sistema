<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Mercearia - Categoria</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Mercearia Pro</h1>
        <p>Sistema Completo</p>
      </div>
      <nav class="menu">
        <a href="index.html">Visão Geral</a>
        <a href="categoria.html" class="active">Categoria</a>
        <a href="cliente.html">Cliente</a>
        <a href="estoque.html">Estoque</a>
        <a href="fornecedor.html">Fornecedor</a>
        <a href="itens.html">Itens</a>
        <a href="pedido.html">Pedido</a>
      </nav>
      <div class="sidebar-footer">
        <small>Gestão da Mercearia</small>
      </div>
    </aside>
    <main class="content">
      <header class="topbar">
        <div>
          <h2>Mercearia Categoria</h2>
          <p>Cadastro e gestão de categorias de produtos</p>
        </div>
      </header>
      <section class="panel">
        <div class="section-head">
          <h3>Categorias</h3>
          <button class="btn" id="btn-salvar">Salvar Categoria</button>
        </div>
        <form class="form-grid two-columns" id="form-categoria">
          <label class="form-control">
            Nome da Categoria
            <input type="text" id="input-nome" placeholder="Ex.: Bebidas">
          </label>
          <label class="form-control">
            Descrição
            <input type="text" id="input-descricao" placeholder="Ex.: Refrigerantes, sucos e águas">
          </label>
        </form>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Categoria</th>
                <th>Descrição</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-categorias">
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="./assets/js/categoria.js"></script>
</body>

</html>
