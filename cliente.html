<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Mercearia - Cliente</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Mercearia Pro</h1>
        <p>Sistema Completo</p>
      </div>
      <nav class="menu">
        <a href="index.html">Visão Geral</a>
        <a href="categoria.html">Categoria</a>
        <a href="cliente.html" class="active">Cliente</a>
        <a href="estoque.html">Estoque</a>
        <a href="fornecedor.html">Fornecedor</a>
        <a href="itens.html">Itens</a>
        <a href="pedido.html">Pedido</a>
      </nav>
      <div class="sidebar-footer">
        <small>Gestão da Mercearia</small>
      </div>
    </aside>
    <main class="content">
      <header class="topbar">
        <div>
          <h2>Mercearia Cliente</h2>
          <p>Cadastro e acompanhamento de clientes</p>
        </div>
      </header>
      <section class="panel">
        <div class="section-head">
          <h3>Clientes</h3>
          
        </div>
        <div class="form-grid three-columns" id="form-cliente">
         
          <label class="form-control">
            Nome
            <input type="text" placeholder="Nome do cliente" id="nome-do-cliente">
          </label>
          <label class="form-control">
            E-mail
            <input type="email" placeholder="cliente@email.com" id="email-do-cliente">
          </label>
      
          <label class="form-control">
            Status
            <select id="status-cliente">
              <option>Ativo</option>
              <option>Bloqueado</option>
            </select>
          </label>
           <button class="btn">Salvar Cliente</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Email</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody  id="tbody-clientes">
              <tr>
                <td>102</td>
                <td>Maria Souza</td>
                <td>mariasouza@exemple.com</td>
                <td><span class="badge success">Ativo</span></td>
                <td>
                  <div class="table-actions">
                    <button onclick="editar(this)" class="btn-action edit">Editar</button>
                    <button class="btn-action delete">Excluir</button>
                  </div>
                </td>
              </tr>
              <!-- -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="./assets/js/cliente.js"></script>
  <script src="./assets/js/form-cliente.js"></script>
</body>
</html>
