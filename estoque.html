<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sistema de Mercearia - Estoque</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Mercearia Pro</h1>
        <p>Sistema Completo</p>
      </div>
      <nav class="menu">
        <a href="index.html">Visão Geral</a>
        <a href="categoria.html">Categoria</a>
        <a href="cliente.html">Cliente</a>
        <a href="estoque.html" class="active">Estoque</a>
        <a href="fornecedor.html">Fornecedor</a>
        <a href="itens.html">Itens</a>
        <a href="pedido.html">Pedido</a>
      </nav>
      <div class="sidebar-footer">
        <small>Gestão da Mercearia</small>
      </div>
    </aside>
    <main class="content">
      <header class="topbar">
        <div>
          <h2>Mercearia Estoque</h2>
          <p>Controle de entradas, saídas e níveis de produtos</p>
        </div>
      </header>
      <section class="panel">
        <div class="section-head">
          <h3>Estoque Atual</h3>
          <button class="btn" id="btn-estoque" type="button">Novo Item</button>
        </div>
        <form class="form-grid three-columns" id="form-estoque">
          <label class="form-control">
            Item
            <input type="text" id="nome-item" placeholder="Nome do produto" />
          </label>
          <label class="form-control">
            Quantidade
            <input type="number" id="quantidade-item" min="1" />
          </label>
          <label class="form-control">
            Fornecedor
            <select id="fornecedor-id" required>
              <option value="">Selecione um fornecedor</option>
            </select>
          </label>
        </form>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th>Quantidade</th>
                <th>ID do Fornecedor</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-estoque"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="./assets/js/estoque.js"></script>
  <script src="./assets/js/form-estoque.js"></script>
</body>
</html>
