<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Mercearia - Itens</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Mercearia Pro</h1>
        <p>Sistema Completo</p>
      </div>
      <nav class="menu">
        <a href="index.html">Visão Geral</a>
        <a href="categoria.html">Categoria</a>
        <a href="cliente.html">Cliente</a>
        <a href="estoque.html">Estoque</a>
        <a href="fornecedor.html">Fornecedor</a>
        <a href="itens.html" class="active">Itens</a>
        <a href="pedido.html">Pedido</a>
      </nav>
      <div class="sidebar-footer">
        <small>Gestão da Mercearia</small>
      </div>
    </aside>
    <main class="content">
      <header class="topbar">
        <div>
          <h2>Mercearia Itens</h2>
          <p>Cadastro e gestão de itens da mercearia</p>
        </div>
      </header>
      <section class="panel">
        <div class="section-head">
          <h3>Itens</h3>
          <button class="btn" id="btn-salvar">Salvar Item</button>
        </div>
        <form class="form-grid three-columns" id="form-item">
          <label class="form-control">
            Nome do Item
            <input type="text" id="input-nome" placeholder="Ex.: Arroz 5kg">
          </label>
          <label class="form-control">
            Preço
            <input type="number" step="0.01" id="input-preco" placeholder="Ex.: 25.90">
          </label>
          <label class="form-control">
            Categoria
            <select id="select-categoria">
              <option value="">Selecione uma categoria</option>
              <!-- Categorias serão carregadas dinamicamente -->
            </select>
          </label>
        </form>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Item</th>
                <th>Preço</th>
                <th>Categoria</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-itens">
              <!-- Os itens serão carregados aqui -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="./assets/js/itens.js"></script>
</body>
</html>
