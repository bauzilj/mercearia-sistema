<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Mercearia - Fornecedor</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Mercearia Pro</h1>
        <p>Sistema Completo</p>
      </div>
      <nav class="menu">
        <a href="index.html">Visão Geral</a>
        <a href="categoria.html">Categoria</a>
        <a href="cliente.html">Cliente</a>
        <a href="estoque.html">Estoque</a>
        <a href="fornecedor.html" class="active">Fornecedor</a>
        <a href="itens.html">Itens</a>
        <a href="pedido.html">Pedido</a>
      </nav>
      <div class="sidebar-footer">
        <small>Gestão da Mercearia</small>
      </div>
    </aside>
    <main class="content">
      <header class="topbar">
        <div>
          <h2>Mercearia Fornecedor</h2>
          <p>Cadastro de parceiros e distribuidores</p>
        </div>
      </header>
      <section class="panel">
        <div class="section-head">
          <h3>Fornecedores</h3>
          <button class="btn">Novo Fornecedor</button>
        </div>
        <form class="form-grid three-columns" id="form-fornecedor">       
          <label class="form-control">
            Empresa
            <input 
              type="text" 
              placeholder="Nome do fornecedor" 
              id="nome-do-fornecedor"
            >
          </label>
          <label class="form-control">
            Telefone
            <input 
              type="text" 
              placeholder="Número de telefone" 
              id="telefone-do-fornecedor"
            >
          </label>
        </form>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-fornecedores">
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="./assets/js/fornecedor.js"></script>
  <script src="./assets/js/form-fornecedor.js"></script>
</body>
</html>
